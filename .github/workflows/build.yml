name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025-vs2026

    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64, Win32]

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild ergo-active.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /m /nologo

      - name: Upload artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: ergo-active-${{ matrix.platform }}
          path: Exe/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ergo-active-x64
          path: artifacts/x64

      - uses: actions/download-artifact@v4
        with:
          name: ergo-active-Win32
          path: artifacts/Win32

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum x64/*.exe Win32/*.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softproof/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/x64/*.exe
            artifacts/Win32/*.exe
            artifacts/SHA256SUMS.txt
